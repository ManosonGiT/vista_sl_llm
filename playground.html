<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISTA-SL | AI Coach Playground</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #4FACFE;
            --secondary: #00F2FE;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0f172a, #111827, #000000);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 800px; height: 800px;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            filter: blur(100px);
            opacity: 0.1;
            z-index: -1;
            animation: move 15s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-30%, -30%); }
            to { transform: translate(30%, 30%); }
        }

        .container {
            width: 95%;
            max-width: 1100px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        header {
            padding: 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { 
            font-size: 1.8rem; 
            font-weight: 600; 
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .status { font-size: 0.85rem; display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--glass-border); }
        .dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 12px #10b981; }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            mask-image: linear-gradient(to top, black 95%, transparent);
        }

        .message {
            max-width: 75%;
            padding: 16px 24px;
            border-radius: 24px;
            font-size: 1rem;
            line-height: 1.6;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(20px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            font-weight: 600;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 30px -10px rgba(79, 172, 254, 0.5);
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .message p { margin-bottom: 15px; }
        .message p:last-child { margin-bottom: 0; }
        .message code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .message a { color: var(--primary); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s; }
        .message a:hover { border-bottom-color: var(--primary); }

        .typing { font-size: 0.8rem; opacity: 0.5; margin-left: 30px; margin-bottom: 10px; display: none; }

        footer {
            padding: 30px;
            display: flex;
            gap: 15px;
            position: relative;
        }

        .input-group {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 18px 24px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        input:focus { 
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary); 
            box-shadow: 0 0 40px rgba(79, 172, 254, 0.15); 
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0 35px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }
        
        button:active { transform: translateY(0); }

        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container" id="main-container">
        <header>
            <div class="brand">
                <h1>VISTA-SL</h1>
            </div>
            <div class="status">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </header>

        <div id="chat-window">
            <div class="message ai">
                Γεια σου! 👋 Είμαι ο AI Coach σου. Πώς μπορώ να σε βοηθήσω με την Ελληνική Νοηματική Γλώσσα σήμερα;
            </div>
        </div>

        <div class="typing" id="typing-indicator">Coach is gesturing...</div>

        <footer>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Type your question about signs, greek alphabet, or lessons..." onkeypress="handleKey(event)">
            </div>
            <button id="send-btn" onclick="sendMessage()">
                <span>Send</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const typingIndicator = document.getElementById('typing-indicator');
        const sendBtn = document.getElementById('send-btn');

        // Check Health on Load
        async function checkHealth() {
            try {
                const res = await fetch('http://localhost:8000/health');
                const data = await res.json();
                if (data.status === 'healthy') {
                    statusText.innerText = `Online (${data.model})`;
                    statusDot.style.background = '#10b981';
                    statusDot.style.boxShadow = '0 0 12px #10b981';
                } else {
                    statusText.innerText = 'Degraded';
                    statusDot.style.background = '#f59e0b';
                }
            } catch (e) {
                statusText.innerText = 'Offline';
                statusDot.style.background = '#ef4444';
                statusDot.style.boxShadow = '0 0 12px #ef4444';
            }
        }
        checkHealth();
        setInterval(checkHealth, 10000);

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = role === 'ai' ? marked.parse(content) : content;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            appendMessage('user', text);
            typingIndicator.style.display = 'block';

            const aiMsgDiv = appendMessage('ai', '');
            let fullText = '';

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: "web-tester",
                        token: "dummy",
                        message: text
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                typingIndicator.style.display = 'none';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') break;
                            try {
                                const data = JSON.parse(dataStr);
                                fullText += data.token;
                                aiMsgDiv.innerHTML = marked.parse(fullText);
                                chatWindow.scrollTop = chatWindow.scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                typingIndicator.style.display = 'none';
                aiMsgDiv.innerText = "Error: Backend unreachable. Make sure 'vista-backend' is running.";
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>
</html>
